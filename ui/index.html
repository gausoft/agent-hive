<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Hive</title>
<style>
:root {
  --bg: #0a0e1a; --bg2: #111827; --bg3: #1e293b; --border: #1e3a5f;
  --text: #e2e8f0; --text2: #64748b; --accent: #3b82f6; --accent2: #2563eb;
  --green: #22c55e; --red: #ef4444; --orange: #f59e0b; --purple: #a855f7;
  --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
}
#app { height: 100vh; display: flex; flex-direction: column; }

/* Header */
.header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 8px 16px; display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.header-left h1 { font-size: 16px; font-weight: 600; }
.header-left h1 span { color: var(--accent); }
.tabs { display: flex; gap: 2px; background: var(--bg3); border-radius: var(--radius); padding: 3px; }
.tab-btn {
  padding: 6px 14px; border-radius: 6px; border: none; background: transparent;
  color: var(--text2); cursor: pointer; font-size: 13px; transition: all .15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { background: var(--accent); color: white; }
.header-right { display: flex; align-items: center; gap: 10px; }
.user-badge { background: var(--bg3); padding: 4px 10px; border-radius: 12px; font-size: 12px; color: var(--text2); }
.btn-logout {
  background: none; border: 1px solid var(--border); color: var(--text2);
  padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* Main */
.main { flex: 1; display: flex; overflow: hidden; }
.tab-panel { display: none; flex: 1; overflow: hidden; }
.tab-panel.active { display: flex; flex-direction: column; }

/* Chat */
.chat-area {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 16px;
}
.msg {
  max-width: 85%; padding: 12px 16px; border-radius: 12px;
  font-size: 14px; line-height: 1.6; word-wrap: break-word;
}
.msg.user { align-self: flex-end; background: var(--accent2); color: white; border-bottom-right-radius: 4px; }
.msg.assistant { align-self: flex-start; background: var(--bg3); border-bottom-left-radius: 4px; }
.msg.assistant.streaming { border-left: 3px solid var(--accent); }
.msg.system { align-self: center; background: var(--bg2); color: var(--text2); font-size: 12px; padding: 6px 12px; }
.msg .error { color: var(--red); }
.msg code { background: rgba(0,0,0,.35); padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: monospace; }
.msg pre { background: rgba(0,0,0,.4); padding: 12px 16px; border-radius: 6px; overflow-x: auto; margin: 8px 0; font-size: 13px; }
.msg pre code { background: none; padding: 0; }
.msg strong { font-weight: 600; }
.msg em { font-style: italic; }

/* Chat input */
.chat-input-bar { border-top: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; }
.chat-controls { padding: 8px 16px 0; display: flex; gap: 8px; }
.mini-select {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text2); padding: 4px 8px; font-size: 12px; cursor: pointer;
}
.mini-select:focus { outline: none; border-color: var(--accent); }
.chat-input-row { display: flex; gap: 8px; padding: 12px 16px; align-items: flex-end; }
.chat-input-row textarea {
  flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); padding: 10px 14px; font-size: 14px; resize: none;
  font-family: inherit; min-height: 44px; max-height: 140px;
  transition: border-color .15s;
}
.chat-input-row textarea:focus { outline: none; border-color: var(--accent); }
.chat-input-row textarea::placeholder { color: var(--text2); }
#sendBtn {
  padding: 10px 20px; background: var(--accent); color: white; border: none;
  border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 500;
  white-space: nowrap; transition: background .15s;
}
#sendBtn:hover { background: var(--accent2); }
#sendBtn:disabled { opacity: .5; cursor: not-allowed; }

/* Token Gate */
.token-gate { flex: 1; display: flex; align-items: center; justify-content: center; }
.token-gate-inner {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
  padding: 40px; width: 380px; text-align: center;
}
.token-gate-inner h2 { font-size: 22px; margin-bottom: 4px; }
.token-gate-inner p { color: var(--text2); font-size: 13px; margin-bottom: 20px; }
.token-gate-inner input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); padding: 12px; font-size: 14px; font-family: monospace; margin-bottom: 12px;
}
.token-gate-inner input:focus { outline: none; border-color: var(--accent); }
.token-gate-inner button {
  width: 100%; padding: 12px; background: var(--accent); color: white;
  border: none; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 500;
}
.token-gate-inner button:hover { background: var(--accent2); }
.token-error { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }
.token-error.visible { display: block; }

/* GitHub Panel */
.gh-layout { display: flex; height: 100%; }
.gh-sidebar { width: 260px; border-right: 1px solid var(--border); background: var(--bg2); display: flex; flex-direction: column; flex-shrink: 0; }
.gh-sidebar-header { padding: 12px; border-bottom: 1px solid var(--border); }
.gh-sidebar-header input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px 10px; font-size: 13px; }
.gh-sidebar-header input:focus { outline: none; border-color: var(--accent); }
.gh-mode-toggle { display: flex; gap: 4px; margin-bottom: 8px; }
.gh-mode-btn { flex: 1; padding: 5px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); cursor: pointer; font-size: 12px; text-align: center; transition: all .15s; }
.gh-mode-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.gh-repo-list { flex: 1; overflow-y: auto; }
.gh-repo-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 13px; transition: background .1s; }
.gh-repo-item:hover { background: var(--bg3); }
.gh-repo-item.active { background: var(--bg3); border-left: 3px solid var(--accent); }
.gh-repo-name { font-weight: 500; }
.gh-repo-desc { color: var(--text2); font-size: 11px; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gh-actions { padding: 12px; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px; }
.gh-actions button { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); cursor: pointer; font-size: 12px; transition: all .15s; }
.gh-actions button:hover { background: var(--accent); border-color: var(--accent); color: white; }
.gh-main { flex: 1; display: flex; flex-direction: column; }
.gh-toolbar { padding: 8px 16px; border-bottom: 1px solid var(--border); background: var(--bg2); display: flex; align-items: center; gap: 12px; font-size: 13px; }
.gh-toolbar .branch { background: var(--bg3); padding: 4px 10px; border-radius: 12px; color: var(--orange); font-weight: 500; }
.gh-toolbar .status { color: var(--text2); }
.gh-files { flex: 1; overflow-y: auto; padding: 8px; }
.gh-file { padding: 6px 12px; cursor: pointer; border-radius: 6px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
.gh-file:hover { background: var(--bg3); }
.gh-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 14px; }
.gh-log { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--bg2); font-size: 12px; color: var(--text2); font-family: monospace; max-height: 100px; overflow-y: auto; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 400px; }
.modal h3 { margin-bottom: 12px; font-size: 16px; }
.modal input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 10px 12px; font-size: 14px; margin-bottom: 12px; }
.modal input:focus { outline: none; border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btns button { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-size: 13px; }
.modal-btns .cancel { background: var(--bg3); color: var(--text); }
.modal-btns .confirm { background: var(--accent); color: white; border-color: var(--accent); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* Loading */
.loading-screen { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text2); }

/* Board */
.board-root { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 12px 16px; gap: 12px; }
.board-new { display: flex; gap: 8px; flex-shrink: 0; }
.board-new input { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px 10px; font-size: 13px; }
.board-new input:focus { outline: none; border-color: var(--accent); }
.board-new #bdRepo, .board-new #bdModel { width: 200px; }
.board-new #bdPrompt { flex: 1; }
.board-new button { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 13px; }
.board-list { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; overflow: hidden; }
.board-col { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; }
.board-col-head { padding: 8px 12px; font-size: 12px; font-weight: 600; color: var(--text2); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
.board-col-head span { background: var(--bg3); border-radius: 10px; padding: 0 7px; }
.board-col-body { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 8px; }
.board-card { background: var(--bg3); border: 1px solid var(--border); border-left: 3px solid var(--text2); border-radius: 6px; padding: 8px 10px; cursor: pointer; transition: border-color .15s; }
.board-card:hover { border-color: var(--accent); }
.board-card.status-running { border-left-color: var(--orange); }
.board-card.status-review { border-left-color: var(--purple); }
.board-card.status-done { border-left-color: var(--green); }
.board-card.status-failed, .board-card.status-aborted { border-left-color: var(--red); }
.board-card-top { display: flex; align-items: center; gap: 6px; font-size: 11px; margin-bottom: 5px; }
.board-card-repo { font-size: 12px; color: var(--text2); }
.board-card-prompt { font-size: 13px; margin-top: 4px; line-height: 1.4; }
.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--text2); }
.pill { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 0 7px; font-size: 10px; text-transform: uppercase; letter-spacing: .03em; }
.pill.pr { background: var(--green); color: #04210f; border-color: var(--green); }
.board-detail { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
.bd-head { display: flex; align-items: center; gap: 10px; }
.bd-head button { background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
.bd-abort { border-color: var(--red) !important; color: var(--red) !important; margin-left: auto; }
.bd-pr { color: var(--green); text-decoration: none; font-size: 13px; }
.bd-meta { font-size: 12px; color: var(--text2); }
.bd-prompt { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-size: 14px; }
.bd-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; min-height: 240px; }
.bd-timeline, .bd-live { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 10px; overflow-y: auto; max-height: 320px; }
.bd-live pre, .bd-diff pre { white-space: pre-wrap; word-break: break-word; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
#bdLive { margin: 0; white-space: pre-wrap; word-break: break-word; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: var(--text); }
.bd-event { font-size: 12px; padding: 3px 0; border-bottom: 1px solid var(--bg3); }
.bd-event-type { color: var(--accent); font-weight: 600; }
.bd-diff { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; }
.bd-diff summary { cursor: pointer; font-size: 13px; color: var(--text2); }
.bd-diff pre { margin-top: 8px; max-height: 360px; overflow: auto; }
.bd-error { background: rgba(239,68,68,.1); border: 1px solid var(--red); border-radius: 6px; padding: 10px 12px; font-size: 13px; color: var(--red); }
</style>
</head>
<body>
<div id="app"><div class="loading-screen">Loading...</div></div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
